<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard | PotonTable</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body style="background-color: var(--bg-color);">
    <nav class="navbar" style="background-color: var(--primary-light); border-bottom: none;">
        <a href="index.html" class="logo" style="color: white; background: none; -webkit-text-fill-color: initial;">⚙️ Admin Center</a>
        <div class="nav-links">
            <a href="chef.html" style="color: #94A3B8;">Kitchen</a>
        </div>
    </nav>

    <main class="container">
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 1.5rem;">
            <h1 class="page-title" style="margin-bottom: 0;">Menu Management</h1>
            <div style="display: flex; gap: 1rem;">
                <div style="background: var(--surface-color); padding: 0.75rem 1.5rem; border-radius: 12px; border: 1px solid var(--border-color); box-shadow: var(--shadow-sm); text-align: center;">
                    <div style="font-size: 0.75rem; color: var(--text-secondary); text-transform: uppercase; font-weight: 700;">Revenue</div>
                    <div id="adminRevenue" style="font-size: 1.25rem; font-weight: 800; color: var(--accent-color);">₹0.00</div>
                </div>
                <div style="background: var(--surface-color); padding: 0.75rem 1.5rem; border-radius: 12px; border: 1px solid var(--border-color); box-shadow: var(--shadow-sm); text-align: center;">
                    <div style="font-size: 0.75rem; color: var(--text-secondary); text-transform: uppercase; font-weight: 700;">Served Orders</div>
                    <div id="adminTotalOrders" style="font-size: 1.25rem; font-weight: 800; color: var(--primary-color);">0</div>
                </div>
            </div>
        </div>
        <div class="admin-layout" style="grid-template-columns: 1fr 1.5fr; gap: 2rem;">
            <div class="admin-form" style="position: sticky; top: 2rem;">
                <h3 style="color: var(--primary-color);">Add New Menu Item</h3>
                <form id="addItemForm" style="margin-top: 1.5rem;">
                    <div class="form-group">
                        <label>Item Name</label>
                        <input type="text" id="itemName" class="form-control" required placeholder="e.g. Avocado Toast">
                    </div>
                    <div class="form-group">
                        <label>Category</label>
                        <select id="itemCategory" class="form-control" required style="appearance: none;">
                            <option value="Starters">Starters</option>
                            <option value="Mains">Mains</option>
                            <option value="Burgers">Burgers</option>
                            <option value="Pizza">Pizza</option>
                            <option value="Salads">Salads</option>
                            <option value="Desserts">Desserts</option>
                            <option value="Drinks">Drinks</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>Price (₹)</label>
                        <input type="number" step="0.01" id="itemPrice" class="form-control" required placeholder="0.00">
                    </div>
                    <div class="form-group">
                        <label>Image URL (Optional)</label>
                        <input type="url" id="itemImage" class="form-control" placeholder="https://images.unsplash.com/...">
                    </div>
                    <button type="submit" class="btn btn-primary" style="width: 100%; margin-top: 1rem; font-weight: 700; padding: 1rem;">Add Menu Item</button>
                </form>
            </div>
            
            <div style="display: flex; flex-direction: column; gap: 2rem;">
                <div style="background: var(--surface-color); padding: 2rem; border-radius: var(--border-radius); box-shadow: var(--shadow-sm); border: 1px solid var(--border-color);">
                    <h3 style="margin-bottom: 1.5rem; color: var(--primary-color); display: flex; justify-content: space-between;">Kitchen Live Stream <span class="badge" style="background:var(--success);">Online</span></h3>
                    <div id="adminLiveStream" style="display: flex; flex-direction: column; gap: 1rem; max-height: 400px; overflow-y: auto; padding-right: 0.5rem;">
                        <!-- Realtime orders loaded here -->
                    </div>
                </div>

                <div style="background: var(--surface-color); padding: 2rem; border-radius: var(--border-radius); box-shadow: var(--shadow-sm); border: 1px solid var(--border-color);">
                    <h3 style="margin-bottom: 1.5rem; color: var(--primary-color);">Current Menu Items</h3>
                    <div id="adminMenuList" style="display: flex; flex-direction: column; gap: 1rem; max-height: 600px; overflow-y: auto; padding-right: 0.5rem;">
                        <!-- Loaded via JS -->
                    </div>
                </div>
            </div>
        </div>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="js/data.js"></script>
    <script src="js/main.js"></script>
    <script src="js/admin.js"></script>
</body>
</html>
