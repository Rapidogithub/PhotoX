<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Menu | PotonTable</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <nav class="navbar" style="padding-bottom: 0.5rem;">
        <div style="display: flex; align-items: center; gap: 1rem;">
            <a href="index.html" style="color: var(--primary-color);">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="19" y1="12" x2="5" y2="12"/><polyline points="12 19 5 12 12 5"/></svg>
            </a>
        </div>
        <div class="nav-links">
            <a href="index.html">Home</a>
            <a href="menu.html" class="active">Menu</a>
            <a href="orders.html">Orders</a>
            <a href="account.html">Account</a>
            <a href="cart.html" class="cart-icon">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M6 2L3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4z"/><line x1="3" y1="6" x2="21" y2="6"/><path d="M16 10a4 4 0 0 1-8 0"/></svg>
                <span class="cart-count">0</span>
            </a>
        </div>
    </nav>

    <div style="width: 100%; height: 180px; position: relative;">
        <img src="https://images.unsplash.com/photo-1555396273-367ea4eb4db5?auto=format&fit=crop&q=80&w=1200" style="width: 100%; height: 100%; object-fit: cover;" alt="Restaurant Cover">
        <div style="position: absolute; bottom: -20px; left: 5%; background: white; padding: 1rem; border-radius: 16px; box-shadow: var(--shadow-sm); width: 90%; border: 1px solid var(--border-color);">
            <h2 style="font-size: 1.5rem; color: var(--primary-color); margin-bottom: 0.25rem;">Poton Eatery</h2>
            <div style="display: flex; gap: 1rem; font-size: 0.85rem; color: var(--text-secondary); font-weight: 500;">
                <span style="display: flex; align-items: center; gap: 4px;"><svg width="14" height="14" viewBox="0 0 24 24" fill="var(--warning)" stroke="var(--warning)" stroke-width="2"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg> 4.8 (120+ ratings)</span>
                <span>• American</span>
            </div>
        </div>
    </div>

    <main class="container" style="padding-top: 3rem;">
        <div class="search-container">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
            <input type="text" id="searchInput" placeholder="Search for dishes...">
        </div>

        <div class="category-bubbles" id="categoryFilters" style="margin-bottom: 2rem;">
            <!-- Categories injected via JS -->
        </div>

        <div class="menu-grid" id="menuGrid">
            <!-- Content injected via JS -->
        </div>
    </main>

    <!-- Floating Sticky Cart -->
    <a href="cart.html" class="floating-cart" id="floatingCart">
        <div class="floating-cart-info"><span id="floatingCartCount">0</span> items</div>
        <div class="floating-cart-text">View Cart <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="9 18 15 12 9 6"/></svg></div>
    </a>

    <!-- Mobile Bottom Navigation -->
    <div class="mobile-bottom-nav">
        <a href="index.html" class="nav-item">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
            Home
        </a>
        <a href="orders.html" class="nav-item">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
            Orders
        </a>
        <a href="account.html" class="nav-item">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
            Account
        </a>
        <a href="cart.html" class="nav-item active" style="position: relative;">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="9" cy="21" r="1"/><circle cx="20" cy="21" r="1"/><path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"/></svg>
            Cart
            <span class="cart-count" style="width: 16px; height: 16px; font-size: 0.65rem; top: -5px; right: 5px;">0</span>
        </a>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="js/data.js"></script>
    <script src="js/main.js"></script>
    <script src="js/menu.js"></script>
</body>
</html>
