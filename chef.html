<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chef Dashboard | PotonTable</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body style="background-color: var(--bg-color);">
    <nav class="navbar" style="background-color: var(--primary-light); border-bottom: none;">
        <a href="index.html" class="logo" style="color: white; background: none; -webkit-text-fill-color: initial;">🍳 Kitchen Screen</a>
        <div class="nav-links">
            <a href="admin.html" style="color: #94A3B8;">Admin</a>
        </div>
    </nav>

    <main class="container">
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 2rem;">
            <h1 class="page-title" style="margin-bottom: 0;">Active Orders</h1>
            <div style="display: flex; gap: 1rem; align-items: center;">
                <span style="display: flex; align-items: center; gap: 0.5rem; font-size: 0.85rem; color: var(--text-secondary);"><span style="width: 8px; height: 8px; background: var(--accent-color); border-radius: 50%; display: inline-block;"></span> Live Sync</span>
                <button class="btn btn-secondary btn-sm" onclick="location.reload()" title="Refresh">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="23 4 23 10 17 10"/><polyline points="1 20 1 14 7 14"/><path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"/></svg>
                </button>
            </div>
        </div>
        <div class="kanban-board">
            <div class="kanban-col" style="border-top: 5px solid var(--danger);">
                <h3 style="margin-bottom: 1.25rem; display: flex; justify-content: space-between; align-items: center;">Pending <span id="countPending" style="background:var(--danger); color:white; padding: 4px 10px; border-radius: 12px; font-size: 0.85rem;">0</span></h3>
                <div id="colPending" style="display: flex; flex-direction: column; gap: 1rem;"></div>
            </div>
            <div class="kanban-col" style="border-top: 5px solid var(--warning);">
                <h3 style="margin-bottom: 1.25rem; display: flex; justify-content: space-between; align-items: center;">Preparing <span id="countPreparing" style="background:var(--warning); color:white; padding: 4px 10px; border-radius: 12px; font-size: 0.85rem;">0</span></h3>
                <div id="colPreparing" style="display: flex; flex-direction: column; gap: 1rem;"></div>
            </div>
            <div class="kanban-col" style="border-top: 5px solid var(--success);">
                <h3 style="margin-bottom: 1.25rem; display: flex; justify-content: space-between; align-items: center;">Ready to Serve <span id="countReady" style="background:var(--success); color:white; padding: 4px 10px; border-radius: 12px; font-size: 0.85rem;">0</span></h3>
                <div id="colReady" style="display: flex; flex-direction: column; gap: 1rem;"></div>
            </div>
        </div>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="js/data.js"></script>
    <script src="js/main.js"></script>
    <script src="js/chef.js"></script>
</body>
</html>
