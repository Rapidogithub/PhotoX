<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>My Account | PotonTable</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body style="background-color: var(--bg-color);">
    <nav class="navbar" style="padding-bottom: 0.5rem;">
        <a href="index.html" class="logo" style="margin: 0 auto;">PotonTable</a>
        <div class="nav-links">
            <a href="index.html">Home</a>
            <a href="menu.html">Menu</a>
            <a href="orders.html">Orders</a>
            <a href="account.html" class="active">Account</a>
            <a href="cart.html" class="cart-icon">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M6 2L3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4z"/><line x1="3" y1="6" x2="21" y2="6"/><path d="M16 10a4 4 0 0 1-8 0"/></svg>
                <span class="cart-count">0</span>
            </a>
        </div>
    </nav>

    <main class="container" style="padding-top: 2rem;">
        <h1 class="page-title" style="margin-bottom: 0.5rem;">My Account</h1>
        <p style="color: var(--text-secondary); margin-bottom: 2rem;">Manage your profile and settings.</p>

        <div style="background: var(--surface-color); border-radius: var(--border-radius); box-shadow: var(--shadow-sm); padding: 1.5rem; border: 1px solid var(--border-color); margin-bottom: 1.5rem;">
            <h3 style="margin-bottom: 1rem; color: var(--primary-color);">Profile Information</h3>
            <form id="profileForm">
                <div class="form-group">
                    <label class="form-label">Full Name</label>
                    <input type="text" id="accName" class="form-control" placeholder="Enter your full name">
                </div>
                <div class="form-group">
                    <label class="form-label">Email Address</label>
                    <input type="email" id="accEmail" class="form-control" placeholder="Enter your email">
                </div>
                <div class="form-group">
                    <label class="form-label">Phone Number</label>
                    <input type="tel" id="accPhone" class="form-control" placeholder="Enter your phone number">
                </div>
                <button type="submit" class="btn btn-primary btn-full">Save Profile</button>
            </form>
        </div>

        <div style="background: var(--surface-color); border-radius: var(--border-radius); box-shadow: var(--shadow-sm); padding: 1.5rem; border: 1px solid var(--border-color); margin-bottom: 1.5rem;">
            <h3 style="margin-bottom: 1rem; color: var(--primary-color);">Address & Location</h3>
            <div style="display: flex; justify-content: space-between; align-items: center; border: 1px dashed var(--border-color); padding: 1.25rem; border-radius: 12px; background: var(--bg-color);">
                <div>
                    <div style="font-weight: 700; color: var(--primary-color); display: flex; align-items: center; gap: 8px;">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="var(--accent-color)" stroke-width="2"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/></svg>
                        Current Delivery Address
                    </div>
                    <div id="accAddress" style="color: var(--text-secondary); font-size: 1rem; font-weight: 500; margin-top: 0.5rem;">No address set. Click Edit to map.</div>
                </div>
                <button class="btn btn-secondary btn-sm" onclick="openLocationModal()">Edit</button>
            </div>
        </div>
        
        <div style="background: var(--surface-color); border-radius: var(--border-radius); box-shadow: var(--shadow-sm); padding: 1.5rem; border: 1px solid var(--border-color); margin-bottom: 2.5rem;">
            <h3 style="margin-bottom: 1rem; color: var(--primary-color);">Preferences</h3>
            <div style="display: flex; justify-content: space-between; align-items: center;">
                <span style="font-weight: 600;">Dark Mode</span>
                <label style="position: relative; display: inline-block; width: 50px; height: 28px;">
                    <input type="checkbox" id="darkModeToggle" style="opacity: 0; width: 0; height: 0;">
                    <span style="position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0; background-color: var(--border-color); transition: .4s; border-radius: 34px;">
                        <span style="position: absolute; content: ''; height: 20px; width: 20px; left: 4px; bottom: 4px; background-color: white; transition: .4s; border-radius: 50%;"></span>
                    </span>
                </label>
            </div>
        </div>
        
        <span id="locText" style="display: none;"></span>

    </main>

    <!-- Mobile Bottom Navigation -->
    <div class="mobile-bottom-nav">
        <a href="index.html" class="nav-item">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
            Home
        </a>
        <a href="orders.html" class="nav-item">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
            Orders
        </a>
        <a href="account.html" class="nav-item active">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
            Account
        </a>
        <a href="cart.html" class="nav-item" style="position: relative;">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="9" cy="21" r="1"/><circle cx="20" cy="21" r="1"/><path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"/></svg>
            Cart
            <span class="cart-count" style="width: 16px; height: 16px; font-size: 0.65rem; top: -5px; right: 5px;">0</span>
        </a>
    </div>

    <!-- Location Modal -->
    <div id="locationModal" class="modal-overlay" style="display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 9999; align-items: flex-end; justify-content: center; backdrop-filter: blur(4px);">
        <div class="modal-content" style="background: var(--bg-color); width: 100%; max-width: 600px; padding: 2rem; border-radius: 24px 24px 0 0; animation: slideInUp 0.3s ease-out;">
            <h3 style="margin-bottom: 1.5rem; color: var(--primary-color);">Delivery Location</h3>
            <button class="btn btn-secondary btn-full" onclick="detectGPSLocation()" style="margin-bottom: 1rem; color: var(--info); border-color: var(--info); font-weight: 700;">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><circle cx="12" cy="12" r="3"/></svg>
                <span id="gpsBtnText">Use Current GPS Location</span>
            </button>
            <div style="text-align: center; margin: 1rem 0; color: var(--text-secondary); font-size: 0.85rem; text-transform: uppercase;">or</div>
            <div class="search-container" style="margin-bottom: 0;">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
                <input type="text" id="manualLocationInput" placeholder="Enter custom address or table number...">
            </div>
            <button class="btn btn-primary btn-full" onclick="saveManualLocation()" style="margin-top: 1.5rem;">Confirm Location</button>
            <button class="btn btn-full" onclick="closeLocationModal()" style="margin-top: 0.5rem; background: transparent; color: var(--text-secondary);">Cancel</button>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script async src="https://maps.googleapis.com/maps/api/js?key=AIzaSyC2D0IKgMZefbUqnKkKV9rrRKOc7k__dNI&libraries=places"></script>
    <script src="js/data.js"></script>
    <script src="js/main.js"></script>
    <script src="js/account.js"></script>
</body>
</html>
