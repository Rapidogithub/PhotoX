<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Cart | PotonTable</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <nav class="navbar" style="padding-bottom: 0.5rem; justify-content: flex-start; gap: 1rem;">
        <a href="menu.html" style="color: var(--primary-color);">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="19" y1="12" x2="5" y2="12"/><polyline points="12 19 5 12 12 5"/></svg>
        </a>
        <span style="font-size: 1.25rem; font-weight: 700; color: var(--primary-color);">My Cart</span>
        <div class="nav-links" style="margin-left: auto;">
            <a href="index.html">Home</a>
        </div>
    </nav>

    <main class="container">
        <div class="cart-layout">
            <div class="cart-items" id="cartContainer" style="border: none; box-shadow: none; padding: 0;">
                <!-- Cart items parsed via JS -->
            </div>
            
            <div class="cart-summary" id="cartSummary" style="border: none; border-top: 1px solid var(--border-color); border-radius: 0; box-shadow: none; margin-top: 1rem; padding: 1.5rem 0;">
                <div class="form-group" style="margin-bottom: 1.5rem;">
                    <label style="font-size: 0.9rem; font-weight: 600; color: var(--primary-color);">Special Instructions / Allergies</label>
                    <textarea id="cartNotes" class="form-control" placeholder="e.g. Extra spicy, NO PEANUTS..." rows="2" style="resize: none;" onblur="localStorage.setItem('poton_notes', this.value)"></textarea>
                </div>
                
                <h3 style="margin-bottom: 1.5rem;">Bill Details</h3>
                <div class="summary-row">
                    <span>Item Total</span>
                    <span id="cartSubtotal" style="font-weight: 600; color: var(--text-primary);">₹0.00</span>
                </div>
                <div class="summary-row">
                    <span>Delivery Fee</span>
                    <span>₹40.00</span>
                </div>
                <div class="summary-row">
                    <span>Taxes & Charges</span>
                    <span id="cartTaxes">₹0.00</span>
                </div>
                <div class="summary-row summary-total">
                    <span>To Pay</span>
                    <span id="cartTotal">₹0.00</span>
                </div>
                
                <a href="checkout.html" class="btn btn-primary btn-full" style="padding: 1rem; font-size: 1.1rem; margin-top: 1rem; justify-content: space-between;">
                    <span>Proceed to Checkout</span>
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="9 18 15 12 9 6"/></svg>
                </a>
            </div>
        </div>
    </main>

    <!-- Mobile Bottom Navigation -->
    <div class="mobile-bottom-nav">
        <a href="index.html" class="nav-item">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
            Home
        </a>
        <a href="orders.html" class="nav-item">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
            Orders
        </a>
        <a href="account.html" class="nav-item">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
            Account
        </a>
        <a href="cart.html" class="nav-item active" style="position: relative;">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="9" cy="21" r="1"/><circle cx="20" cy="21" r="1"/><path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"/></svg>
            Cart
        </a>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="js/data.js"></script>
    <script src="js/main.js"></script>
    <script src="js/cart.js"></script>
</body>
</html>
